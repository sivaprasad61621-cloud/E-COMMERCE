name: VELORA E-Commerce CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    name: Build & Test Suite
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-[version]: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            customer/package-lock.json
            admin/package-lock.json

      # 1. Server Testing & Linting
      - name: Install Server Dependencies
        run: cd server && npm ci

      - name: Run Backend Unit Tests
        run: cd server && npm test
        env:
          REDIS_URL: redis://localhost:6379

      # 2. Customer Frontend Build Validation
      - name: Install Customer Dependencies
        run: cd customer && npm ci

      - name: Build Customer Frontend
        run: cd customer && npm run build

      # 3. Admin Frontend Build Validation
      - name: Install Admin Dependencies
        run: cd admin && npm ci

      - name: Build Admin Frontend
        run: cd admin && npm run build

  deploy-verce:
    name: Trigger Vercel Auto-Deployment
    needs: test-and-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm Deployment Trigger
        run: echo "CI/CD Pipeline succeeded! GitHub repository changes automatically deployed to Vercel production endpoints."
